services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stagium
      POSTGRES_USER: stagium
      POSTGRES_PASSWORD: stagium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stagium -d stagium"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
